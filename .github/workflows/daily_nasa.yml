name: Daily NASA News Generator

on:
  schedule:
    - cron: "11 21 * * *"
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 优化点 1：使用 uv 代替传统的 setup-python 和 pip
      # uv 是用 Rust 写的，安装速度比 pip 快 10-100 倍
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true # 自动处理缓存，第二次运行极快
          cache-dependency-glob: "requirements.txt"

      - name: Set up Python
        run: uv python install 3.10

      # 优化点 2：使用 uv 同步依赖
      # 如果 requirements.txt 没变，uv 会直接从缓存读取，几乎不耗时
      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt

      - name: Run NASA news generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENROUTER_MODEL_NAME: ${{ vars.OPENROUTER_MODEL_NAME }}
          GROQ_MODEL_NAME: ${{ vars.GROQ_MODEL_NAME }}
          MINIMAX_MODEL_NAME: ${{ vars.MINIMAX_MODEL_NAME }}
          MINIMAX_OPENAI_BASE_URL: ${{ vars.MINIMAX_OPENAI_BASE_URL }}
          OPENROUTER_REQUEST_TIMEOUT: "180"
          MINIMAX_REQUEST_TIMEOUT: "120"
          GROQ_REQUEST_TIMEOUT: "180"
          OPENROUTER_STREAM: "true"
          OPENROUTER_MAX_TOKENS: "8192"
          GROQ_MAX_TOKENS: "8192"
        # 优化点 3：使用 uv run 执行，确保环境隔离且快速
        run: uv run nasa_news.py

      - name: Commit and push generated files
        # 优化点 4：将配置提取，减少重复执行
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.md *.json assets/ state/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto-generate daily NASA news $(date +'%Y-%m-%d')"
            git push
          fi
