name: Daily NASA News Generator

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NASA news generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENROUTER_MODEL_NAME: ${{ vars.OPENROUTER_MODEL_NAME }}
          MINIMAX_MODEL_NAME: ${{ vars.MINIMAX_MODEL_NAME }}
          MINIMAX_OPENAI_BASE_URL: ${{ vars.MINIMAX_OPENAI_BASE_URL }}
          OPENROUTER_REQUEST_TIMEOUT: "180"
          MINIMAX_REQUEST_TIMEOUT: "120"
          OPENROUTER_STREAM: "true"
          OPENROUTER_MAX_TOKENS: "8192"
        run: python nasa_news.py

      - name: Commit and push generated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.md *.json assets/ state/
          git status
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto-generate daily NASA news $(date +'%Y-%m-%d')"
            git push
          fi
